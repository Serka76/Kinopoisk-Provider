<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1000" height="620" fill="#ffffff"/>

  <!-- Plex -->
  <rect x="30" y="60" width="200" height="90" rx="12" fill="#e5a00d" stroke="#a56b00" stroke-width="2"/>
  <text x="130" y="98" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Plex Media</text>
  <text x="130" y="120" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Server</text>

  <!-- kinopoisk-provider box -->
  <rect x="330" y="30" width="330" height="330" rx="14" fill="#f4f6fb" stroke="#3355aa" stroke-width="2"/>
  <text x="495" y="58" text-anchor="middle" font-size="17" font-weight="bold" fill="#22336a">kinopoisk-provider</text>
  <text x="495" y="76" text-anchor="middle" font-size="12" fill="#5566aa">(Docker-контейнер, FastAPI)</text>

  <rect x="355" y="95" width="280" height="46" rx="8" fill="#ffffff" stroke="#8899cc"/>
  <text x="495" y="123" text-anchor="middle" font-size="13" fill="#333">main.py — эндпоинты /movie/...</text>

  <rect x="355" y="155" width="280" height="46" rx="8" fill="#ffffff" stroke="#8899cc"/>
  <text x="495" y="183" text-anchor="middle" font-size="13" fill="#333">poiskkino_mapper.py — сборка карточки</text>

  <rect x="355" y="215" width="130" height="46" rx="8" fill="#ffffff" stroke="#8899cc"/>
  <text x="420" y="243" text-anchor="middle" font-size="12" fill="#333">poiskkino_client</text>

  <rect x="500" y="215" width="135" height="46" rx="8" fill="#ffffff" stroke="#8899cc"/>
  <text x="567" y="243" text-anchor="middle" font-size="12" fill="#333">tmdb_client</text>

  <rect x="355" y="275" width="280" height="46" rx="8" fill="#fff7e0" stroke="#cc9900"/>
  <text x="495" y="303" text-anchor="middle" font-size="12" fill="#5a4400">/image-proxy — картинки TMDB через прокси</text>

  <!-- poiskkino.dev -->
  <rect x="770" y="60" width="190" height="80" rx="12" fill="#dff0d8" stroke="#4a8b3f" stroke-width="2"/>
  <text x="865" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#2a5a20">poiskkino.dev</text>
  <text x="865" y="114" text-anchor="middle" font-size="11" fill="#3a6a30">Кинопоиск API</text>

  <!-- hysteria proxy -->
  <rect x="330" y="430" width="330" height="90" rx="14" fill="#f0e6fa" stroke="#7a3fa0" stroke-width="2"/>
  <text x="495" y="460" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a2378">hysteria-proxy</text>
  <text x="495" y="480" text-anchor="middle" font-size="11" fill="#6a3388">опциональный sidecar-контейнер</text>
  <text x="495" y="498" text-anchor="middle" font-size="11" fill="#6a3388">(нужен, если TMDB заблокирован у вас)</text>

  <!-- TMDB -->
  <rect x="770" y="440" width="190" height="80" rx="12" fill="#dbe9f7" stroke="#2f6ea3" stroke-width="2"/>
  <text x="865" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f4a70">TMDB</text>
  <text x="865" y="489" text-anchor="middle" font-size="11" fill="#2f6ea3">фото актёров</text>

  <!-- Arrows -->
  <line x1="230" y1="105" x2="330" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="98" text-anchor="middle" font-size="10" fill="#555">HTTP</text>

  <line x1="635" y1="118" x2="770" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="95" text-anchor="middle" font-size="10" fill="#555">API-ключ</text>

  <line x1="567" y1="261" x2="495" y2="430" stroke="#7a3fa0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="360" text-anchor="middle" font-size="10" fill="#7a3fa0">если задан TMDB_PROXY_URL</text>

  <line x1="660" y1="475" x2="770" y2="475" stroke="#2f6ea3" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="567" y1="215" x2="567" y2="200" stroke="#2f6ea3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- legend -->
  <rect x="30" y="540" width="920" height="60" rx="10" fill="#fafafa" stroke="#ddd"/>
  <text x="50" y="565" font-size="12" fill="#333">Основные данные (описание, рейтинг, рецензии, каст) — всегда с Кинопоиска через poiskkino.dev.</text>
  <text x="50" y="583" font-size="12" fill="#333">Фото актёров для нероссийских фильмов — с TMDB (опционально, через прокси, если TMDB заблокирован у вас).</text>
</svg>
